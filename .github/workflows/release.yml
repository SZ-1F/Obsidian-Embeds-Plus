# Creates a draft release with build artefacts when a version tag is pushed.
# Compatible with GitHub Actions.
name: Release
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build plugin
        run: npm run build
      - name: Verify build artefacts
        run: |
          for File in main.js styles.css manifest.json; do
            if [ ! -f "$File" ]; then
              echo "Error: Expected build artefact '$File' not found."
              exit 1
            fi
          done
      - name: Package release archive
        run: zip "embeds-plus-${{ steps.version.outputs.version }}.zip" main.js styles.css manifest.json
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          body: |
            # Embeds+ Release v${{ steps.version.outputs.version }}
            **Fixed/Removed:**
            **Added:**
          files: |
            main.js
            styles.css
            manifest.json
            Embeds-Plus-v${{ steps.version.outputs.version }}.zip